name: Create Branch on Issue Creation

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Extract Branch Name from Issue Title
        id: extract_branch_name
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_TITLE=$(jq -r '.issue.title // ""' "$GITHUB_EVENT_PATH")

          BRANCH_NAME="issue-${ISSUE_NUMBER}"

          if echo "$ISSUE_TITLE" | grep -q "^\[FEAT\]"; then
            BRANCH_NAME="feat-${ISSUE_NUMBER}"
          else
            CATEGORY=$(echo "$ISSUE_TITLE" | grep -oP "(?<=\[).+?(?=\])" | head -n 1)

            if [[ -n "$CATEGORY" ]]; then
              CATEGORY_LOWER=$(echo "$CATEGORY" | tr '[:upper:]' '[:lower:]')
              BRANCH_NAME="${CATEGORY_LOWER}-${ISSUE_NUMBER}"
            fi
          fi

          BRANCH_NAME=$(echo "$BRANCH_NAME" | tr ' ' '-' | tr -cd '[:alnum:]_-')

          echo "최종 브랜치 이름: $BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Branch and Push
        run: |
          git fetch origin main
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch already exists: $BRANCH_NAME"
            exit 0
          fi
          git checkout -b "$BRANCH_NAME" origin/main
          git push origin "$BRANCH_NAME"

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            const branch_name = process.env.BRANCH_NAME;
            github.rest.issues.createComment({
              issue_number: issue_number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Created branch: \`${branch_name}\``
            });
