name: TestFlight CI

on:
  # TODO: 초기 프로젝트 설정이 끝난 뒤 자동 배포가 필요하면 아래 push 트리거를 다시 활성화하세요.
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15
    concurrency:
      group: testflight-ci
      cancel-in-progress: true

    env:
      # TODO: App Store Connect API Key 정보를 GitHub Secrets에 등록하세요.
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # TODO: fastlane/Appfile, Fastfile, Matchfile에서 사용하는 프로젝트별 값을 GitHub Secrets에 등록하세요.
      FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
      FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
      APP_IDENTIFIER_RELEASE: ${{ secrets.APP_IDENTIFIER_RELEASE }}
      APP_IDENTIFIER_BETA: ${{ secrets.APP_IDENTIFIER_BETA }}
      APP_IDENTIFIER_DEV: ${{ secrets.APP_IDENTIFIER_DEV }}

      # TODO: fastlane match 인증서 저장소 접근 정보를 GitHub Secrets에 등록하세요.
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_URL_SSH: ${{ secrets.MATCH_GIT_URL_SSH }}
      MATCH_USERNAME: ${{ secrets.MATCH_USERNAME }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
      MATCH_KEYCHAIN_NAME: "build.keychain"
      MATCH_SSH_PRIVATE_KEY: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      # TODO: 인증서 저장소 브랜치와 배포 환경을 프로젝트에 맞게 조정하세요.
      MATCH_GIT_BRANCH: "master"
      TUIST_BUILD_CONFIG: "BETA"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight required configuration
        run: |
          missing=0
          require_env() {
            local name="$1"
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub Secret::$name is empty"
              missing=1
            fi
          }

          require_env ASC_KEY_ID
          require_env ASC_ISSUER_ID
          require_env ASC_API_KEY_BASE64
          require_env FASTLANE_APPLE_ID
          require_env FASTLANE_ITC_TEAM_ID
          require_env DEVELOPMENT_TEAM
          require_env APP_IDENTIFIER_RELEASE
          require_env APP_IDENTIFIER_BETA
          require_env APP_IDENTIFIER_DEV
          require_env MATCH_GIT_URL_SSH
          require_env MATCH_PASSWORD
          require_env MATCH_KEYCHAIN_PASSWORD
          require_env MATCH_SSH_PRIVATE_KEY

          if [ "$missing" -ne 0 ]; then
            echo "Required GitHub Secrets are missing. See README.md Initial Setup Checklist."
            exit 1
          fi

          scripts/validate_template_setup.sh

      - name: Configure bundler path
        run: bundle config set --local path 'vendor/bundle'

      - name: Sync bundler version
        run: bundle update --bundler

      - name: Cache bundler
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-bundler-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-bundler-

      - name: Install gems (fastlane via bundler)
        run: |
          bundle install --jobs 4 --retry 3

      - name: Write App Store Connect API key (.p8)
        run: |
          if [ -z "${ASC_API_KEY_BASE64}" ]; then
            echo "ASC_API_KEY_BASE64 is empty" >&2; exit 1; fi
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/AuthKey_${ASC_KEY_ID}.p8"
          ls -l "$HOME/AuthKey_${ASC_KEY_ID}.p8"

      - name: Select Xcode (Latest Stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show Xcode & SDKs
        run: |
          ls -1 /Applications | grep -E '^Xcode' || true
          xcodebuild -version
          xcodebuild -showsdks

      - name: Ensure Keychain (for match)
        run: |
          security create-keychain -p "$MATCH_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MATCH_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

      - name: Install Tuist (mise)
        uses: jdx/mise-action@v3

      - name: Setup Tuist
        run: |
          mise install
          tuist version

      - name: Prepare xcconfig (BETA only)
        run: |
          mkdir -p Xcconfig/Project
          mkdir -p Xcconfig/Target
          cp Xcconfig/Project/Sample_dev.xcconfig Xcconfig/Project/dev.xcconfig
          cp Xcconfig/Project/Sample_beta.xcconfig Xcconfig/Project/beta.xcconfig
          cp Xcconfig/Project/Sample_release.xcconfig Xcconfig/Project/release.xcconfig
          cp Xcconfig/Sample_Env.xcconfig Xcconfig/Env.xcconfig
          cp Xcconfig/Sample_Shared.xcconfig Xcconfig/Shared.xcconfig
          if [ -n "$API_BASE_URL" ]; then
              SAFE_API_BASE_URL=$(printf '%s' "$API_BASE_URL" | sed 's#//#/$()/#g')
              {
                echo ""
                echo "// Injected from GitHub Actions secret"
                echo "API_BASE_URL = $SAFE_API_BASE_URL"
              } >> Xcconfig/Env.xcconfig
          fi
          if [ -n "$DEVELOPMENT_TEAM" ]; then
              sed -i '' "s/^DEVELOPMENT_TEAM *=.*/DEVELOPMENT_TEAM = $DEVELOPMENT_TEAM/" \
              Xcconfig/Project/beta.xcconfig
          fi

      - name: Install Tuist dependencies
        run: |
          tuist install

      - name: Generate Xcode project with Tuist
        run: |
          tuist install
          tuist generate

      - name: Setup SSH for match repo
        run: |
          mkdir -p ~/.ssh
          if [ -z "$MATCH_SSH_PRIVATE_KEY" ]; then
            echo "MATCH_SSH_PRIVATE_KEY is empty" >&2
            exit 1
          fi
          echo "$MATCH_SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -lf ~/.ssh/id_rsa -E sha256
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          # (선택) 연결 확인
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa" git ls-remote $MATCH_GIT_URL_SSH -h HEAD

      - name: Fastlane Beta (Build & Upload)
        run: |
          bundle exec fastlane beta
